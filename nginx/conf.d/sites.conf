

server {
    listen 80;
    # server_name localhost;
    server_name _;

    location =/site1 {
        return 301 http://localhost/site1/;
        }
    location =/site2 {
        return 301 http://localhost/site2/;
    }
    
    location /site1/ {
        proxy_pass http://site1/;
    }
    location /site2/ {
        proxy_pass http://site2/;
    }
}
    
